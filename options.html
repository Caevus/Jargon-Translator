<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      padding: 16px;
      max-width: 420px;
      color: #1a1a1a;
    }
    h2 { margin: 0 0 12px; font-size: 16px; }
    label { display: block; margin-top: 12px; font-weight: 600; }
    input, select {
      width: 100%;
      padding: 6px 8px;
      margin-top: 4px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
    }
    .hint {
      font-size: 12px;
      color: #666;
      margin-top: 2px;
    }
    button {
      margin-top: 16px;
      padding: 8px 16px;
      background: #0060df;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #003eaa; }
    .status {
      margin-top: 8px;
      font-size: 13px;
      color: #058b00;
    }
  </style>
</head>
<body>
  <h2>Jargon Translator Settings</h2>

  <label for="apiKey">API Key</label>
  <input type="password" id="apiKey" placeholder="sk-or-...">
  <p class="hint">An OpenRouter key is recommended (free tier available).</p>

  <label for="apiEndpoint">API Endpoint</label>
  <input type="url" id="apiEndpoint" placeholder="https://openrouter.ai/api/v1/chat/completions">
  <p class="hint">Any OpenAI-compatible endpoint works.</p>

  <label for="modelName">Model</label>
  <input type="text" id="modelName" placeholder="google/gemini-2.0-flash-001">
  <p class="hint">Must support JSON output. Free-tier models work fine.</p>

  <label for="selectivity">Selectivity</label>
  <select id="selectivity">
    <option value="low">Low — flag most technical terms and acronyms</option>
    <option value="medium" selected>Medium — skip terms that are common knowledge or already explained nearby</option>
    <option value="high">High — only flag highly specialized jargon</option>
  </select>
  <p class="hint">Controls how aggressively terms are flagged. Higher = fewer, more targeted results.</p>

  <button id="save">Save</button>
  <div class="status" id="status"></div>

  <script src="options.js"></script>
</body>
</html>
