<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 12px 14px;
      color: #1a1a1a;
    }
    h3 {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 700;
    }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
    }
    .toggle-row + .toggle-row,
    .toggle-row + .color-row {
      border-top: 1px solid #eee;
    }
    .color-row + .toggle-row {
      border-top: 1px solid #eee;
    }
    .toggle-label {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .swatch {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      cursor: pointer;
    }
    .swatch:hover { opacity: 0.75; }
    .swatch-jargon  { background: rgba(255, 210, 50, 0.60); }
    .swatch-notable { background: rgba(100, 160, 255, 0.55); }

    /* Inline color picker row */
    .color-row {
      display: none;
      gap: 5px;
      align-items: center;
      padding: 5px 0 6px 0;
    }
    .color-row.open { display: flex; }
    .color-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      padding: 0;
      box-sizing: border-box;
      flex-shrink: 0;
    }
    .color-dot.selected { border-color: #0060df; }
    .color-dot:hover { border-color: #999; }
    .color-dot[data-color="custom"] {
      background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red) !important;
    }
    .color-hex {
      width: 62px;
      padding: 2px 4px;
      border: 1px solid #ccc;
      border-radius: 3px;
      font: 11px/1.3 monospace;
      display: none;
    }
    .color-hex.visible { display: inline-block; }

    /* Toggle switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .switch input:checked + .slider { background: #0060df; }
    .switch input:checked + .slider::before { transform: translateX(16px); }
  </style>
</head>
<body>
  <h3>Jargon Translator</h3>

  <div class="toggle-row">
    <span class="toggle-label">
      <span class="swatch swatch-jargon" data-picker="jargonColorRow" title="Click to change color"></span> Jargon
    </span>
    <label class="switch">
      <input type="checkbox" id="enableJargon">
      <span class="slider"></span>
    </label>
  </div>
  <div class="color-row" id="jargonColorRow">
    <span class="color-dot" data-color="yellow" style="background:rgba(255,210,50,0.6)" title="Yellow"></span>
    <span class="color-dot" data-color="blue" style="background:rgba(100,160,255,0.55)" title="Blue"></span>
    <span class="color-dot" data-color="green" style="background:rgba(100,200,120,0.55)" title="Green"></span>
    <span class="color-dot" data-color="pink" style="background:rgba(255,140,170,0.55)" title="Pink"></span>
    <span class="color-dot" data-color="purple" style="background:rgba(180,130,255,0.55)" title="Purple"></span>
    <span class="color-dot" data-color="custom" title="Custom"></span>
    <input type="text" class="color-hex" id="jargonCustomHex" placeholder="#hex" maxlength="7">
  </div>

  <div class="toggle-row">
    <span class="toggle-label">
      <span class="swatch swatch-notable" data-picker="notableColorRow" title="Click to change color"></span> Notable people &amp; orgs
    </span>
    <label class="switch">
      <input type="checkbox" id="enableNotable">
      <span class="slider"></span>
    </label>
  </div>
  <div class="color-row" id="notableColorRow">
    <span class="color-dot" data-color="yellow" style="background:rgba(255,210,50,0.6)" title="Yellow"></span>
    <span class="color-dot" data-color="blue" style="background:rgba(100,160,255,0.55)" title="Blue"></span>
    <span class="color-dot" data-color="green" style="background:rgba(100,200,120,0.55)" title="Green"></span>
    <span class="color-dot" data-color="pink" style="background:rgba(255,140,170,0.55)" title="Pink"></span>
    <span class="color-dot" data-color="purple" style="background:rgba(180,130,255,0.55)" title="Purple"></span>
    <span class="color-dot" data-color="custom" title="Custom"></span>
    <input type="text" class="color-hex" id="notableCustomHex" placeholder="#hex" maxlength="7">
  </div>

  <script src="popup.js"></script>
</body>
</html>
