<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 12px 14px;
      color: #1a1a1a;
    }
    h3 {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 700;
    }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
    }
    .toggle-row + .toggle-row {
      border-top: 1px solid #eee;
    }
    .toggle-label {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .swatch {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }
    .swatch-jargon  { background: rgba(255, 210, 50, 0.60); }
    .swatch-notable { background: rgba(100, 160, 255, 0.55); }

    /* Toggle switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .switch input:checked + .slider { background: #0060df; }
    .switch input:checked + .slider::before { transform: translateX(16px); }
  </style>
</head>
<body>
  <h3>Jargon Translator</h3>

  <div class="toggle-row">
    <span class="toggle-label">
      <span class="swatch swatch-jargon"></span> Jargon
    </span>
    <label class="switch">
      <input type="checkbox" id="enableJargon">
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">
      <span class="swatch swatch-notable"></span> Notable people &amp; orgs
    </span>
    <label class="switch">
      <input type="checkbox" id="enableNotable">
      <span class="slider"></span>
    </label>
  </div>

  <script src="popup.js"></script>
</body>
</html>
